<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Task Accordion</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; background: #fff; padding: 12px 16px; font-size: 14px; }
.toolbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: 12px; border-bottom: 1px solid #e5e5e5; margin-bottom: 12px; }
.toolbar-title { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.toolbar-actions { display: flex; gap: 8px; }
.btn { font-size: 13px; padding: 5px 12px; border: 1px solid #d0d0d0; border-radius: 6px; background: #fff; color: #1a1a1a; cursor: pointer; }
.btn:hover { background: #f5f5f5; }
.day-group { border: 1px solid #e5e5e5; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
.day-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; background: #f9f9f9; user-select: none; }
.day-header:hover { background: #f0f0f0; }
.chevron { font-size: 13px; transition: transform 0.2s; color: #888; display: inline-block; }
.chevron.open { transform: rotate(180deg); }
.day-label { font-size: 14px; font-weight: 500; flex: 1; }
.task-count { font-size: 12px; color: #888; background: #fff; border: 1px solid #e5e5e5; border-radius: 99px; padding: 2px 10px; }
.day-body { display: none; border-top: 1px solid #e5e5e5; }
.day-body.open { display: block; }
.task-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
.task-table th { padding: 8px 10px; text-align: left; font-weight: 500; font-size: 12px; color: #888; border-bottom: 1px solid #e5e5e5; background: #fff; }
.task-table td { padding: 4px 6px; border-bottom: 1px solid #f0f0f0; color: #1a1a1a; }
.task-table tr:last-child td { border-bottom: none; }
.task-table tr:hover td { background: #fafafa; }
.cell-input { width: 100%; font-size: 13px; padding: 5px 6px; border: 1px solid transparent; border-radius: 4px; background: transparent; color: #1a1a1a; font-family: inherit; }
.cell-input:hover { border-color: #d0d0d0; background: #fff; }
.cell-input:focus { outline: none; border-color: #999; background: #fff; }
.cell-select { width: 100%; font-size: 13px; padding: 4px 6px; border: 1px solid transparent; border-radius: 4px; background: transparent; color: #1a1a1a; font-family: inherit; cursor: pointer; }
.cell-select:hover { border-color: #d0d0d0; background: #fff; }
.cell-select:focus { outline: none; border-color: #999; background: #fff; }
.status-ongoing { color: #185FA5; font-weight: 500; }
.status-done { color: #3B6D11; font-weight: 500; }
.status-pending { color: #854F0B; font-weight: 500; }
.status-cancelled { color: #A32D2D; font-weight: 500; }
.add-row { padding: 8px 12px; border-top: 1px solid #f0f0f0; }
.btn-add { font-size: 13px; padding: 4px 10px; border: 1px dashed #d0d0d0; border-radius: 6px; background: transparent; color: #888; cursor: pointer; width: 100%; text-align: left; }
.btn-add:hover { background: #f5f5f5; color: #1a1a1a; }
.saved-toast { position: fixed; bottom: 16px; right: 16px; background: #EAF3DE; color: #27500A; font-size: 13px; padding: 8px 14px; border-radius: 6px; border: 1px solid #C0DD97; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
.saved-toast.show { opacity: 1; }
.no-data { padding: 2rem; text-align: center; color: #888; font-size: 14px; }
th:nth-child(1), td:nth-child(1) { width: 28%; }
th:nth-child(2), td:nth-child(2) { width: 22%; }
th:nth-child(3), td:nth-child(3) { width: 14%; }
th:nth-child(4), td:nth-child(4) { width: 18%; }
th:nth-child(5), td:nth-child(5) { width: 18%; }
</style>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-title">&#128197; Tasks by date</span>
  <div class="toolbar-actions">
    <button class="btn" id="expandAll">Expand all</button>
    <button class="btn" id="collapseAll">Collapse all</button>
  </div>
</div>
<div id="accordion"></div>
<div class="saved-toast" id="savedToast">&#10003; Saved</div>

<script>
let records = [];
let flashTimer;
const STATUS_OPTIONS = ['Ongoing', 'Pending', 'Done', 'Cancelled'];

function showToast() {
  const t = document.getElementById('savedToast');
  t.classList.add('show');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function saveField(id, gristField, value) {
  const rec = records.find(r => r.id === id);
  if (rec) rec[gristField] = value;
  if (typeof grist !== 'undefined') {
    grist.docApi.applyUserActions([['UpdateRecord', 'SUBTASKS', id, { [gristField]: value }]])
      .then(showToast).catch(e => console.error('Save error:', e));
  } else {
    showToast();
  }
}

function addTask(dateKey) {
  const newRec = { id: Date.now(), Task: '', Steps: '', Status: 'Pending', Date_Schedule: dateKey, Deadline: '', Date_Closed: '' };
  records.push(newRec);
  if (typeof grist !== 'undefined') {
    grist.docApi.applyUserActions([['AddRecord', 'SUBTASKS', null, {
      Task: '', Steps: '', Status: 'Pending', Date_Schedule: dateKey, Deadline: '', Date_Closed: ''
    }]]).then(res => { newRec.id = res.rowId; showToast(); }).catch(e => console.error('Add error:', e));
  }
  buildAccordion(records, dateKey);
}

function formatDate(d) {
  if (!d) return '';
  const p = d.split('/');
  if (p.length !== 3) return d;
  const dt = new Date(p[2], p[0]-1, p[1]);
  return isNaN(dt) ? d : dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function statusClass(s) {
  if (!s) return '';
  return { ongoing: 'status-ongoing', done: 'status-done', pending: 'status-pending', cancelled: 'status-cancelled' }[s.toLowerCase()] || '';
}

function makeInput(rec, gristField, value, placeholder) {
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'cell-input';
  inp.value = value || '';
  inp.placeholder = placeholder || '';
  inp.addEventListener('blur', () => { if (inp.value !== (value || '')) saveField(rec.id, gristField, inp.value); });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
  return inp;
}

function makeSelect(rec, value) {
  const sel = document.createElement('select');
  sel.className = 'cell-select ' + statusClass(value);
  STATUS_OPTIONS.forEach(opt => {
    const o = document.createElement('option');
    o.value = opt; o.textContent = opt;
    if (opt === value) o.selected = true;
    sel.appendChild(o);
  });
  sel.addEventListener('change', () => {
    sel.className = 'cell-select ' + statusClass(sel.value);
    saveField(rec.id, 'Status', sel.value);
  });
  return sel;
}

function buildAccordion(recs, focusDate) {
  records = recs;
  const grouped = {};
  recs.forEach(r => {
    const key = r.Date_Schedule || '';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  const sorted = Object.keys(grouped).sort((a, b) => {
    const ms = s => { const p = s.split('/'); return new Date(p[2], p[0]-1, p[1]).getTime(); };
    return ms(b) - ms(a);
  });

  const acc = document.getElementById('accordion');
  const openDates = {};
  acc.querySelectorAll('.day-group').forEach(g => {
    openDates[g.dataset.date] = g.querySelector('.day-body').classList.contains('open');
  });
  acc.innerHTML = '';

  if (sorted.length === 0) {
    acc.innerHTML = '<div class="no-data">No tasks found. Make sure this widget is linked to your SUBTASKS table in Grist.</div>';
    return;
  }

  sorted.forEach((dateKey, i) => {
    const tasks = grouped[dateKey];
    const isOpen = focusDate === dateKey ? true : (dateKey in openDates ? openDates[dateKey] : i === 0);

    const group = document.createElement('div');
    group.className = 'day-group';
    group.dataset.date = dateKey;

    const header = document.createElement('div');
    header.className = 'day-header';
    header.innerHTML = `
      <span class="chevron ${isOpen ? 'open' : ''}">&#9660;</span>
      <span class="day-label">${formatDate(dateKey)}</span>
      <span class="task-count">${tasks.length} task${tasks.length !== 1 ? 's' : ''}</span>
    `;

    const body = document.createElement('div');
    body.className = 'day-body' + (isOpen ? ' open' : '');

    const table = document.createElement('table');
    table.className = 'task-table';
    table.innerHTML = `<thead><tr>
      <th>Task</th><th>Steps</th><th>Status</th><th>Deadline</th><th>Date closed</th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');

    tasks.forEach(rec => {
      const tr = document.createElement('tr');
      [
        makeInput(rec, 'Task', rec.Task, 'Task name'),
        makeInput(rec, 'Steps', rec.Steps, 'Steps'),
        makeSelect(rec, rec.Status),
        makeInput(rec, 'Deadline', rec.Deadline, 'MM/DD/YYYY'),
        makeInput(rec, 'Date_Closed', rec.Date_Closed, 'MM/DD/YYYY'),
      ].forEach(el => {
        const td = document.createElement('td');
        td.appendChild(el);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    body.appendChild(table);

    const addRow = document.createElement('div');
    addRow.className = 'add-row';
    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add';
    addBtn.textContent = '+ Add task';
    addBtn.addEventListener('click', () => addTask(dateKey));
    addRow.appendChild(addBtn);
    body.appendChild(addRow);

    header.addEventListener('click', () => {
      const chevron = header.querySelector('.chevron');
      const wasOpen = body.classList.contains('open');
      body.classList.toggle('open', !wasOpen);
      chevron.classList.toggle('open', !wasOpen);
    });

    group.appendChild(header);
    group.appendChild(body);
    acc.appendChild(group);
  });
}

document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.day-body').forEach(b => b.classList.add('open'));
  document.querySelectorAll('.chevron').forEach(c => c.classList.add('open'));
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.day-body').forEach(b => b.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(c => c.classList.remove('open'));
});

if (typeof grist !== 'undefined') {
  grist.ready({ requiredAccess: 'full' });
  grist.onRecords(recs => {
    const mapped = recs.map(r => ({
      id: r.id,
      Task: r.Task || '',
      Steps: r.Steps || '',
      Status: r.Status || '',
      Date_Schedule: r.Date_Schedule || r.DateSchedule || r['Date Schedule'] || '',
      Deadline: r.Deadline || '',
      Date_Closed: r.Date_Closed || r.DateClosed || r['Date Closed'] || '',
    }));
    buildAccordion(mapped);
  });
}
</script>
</body>
</html>
